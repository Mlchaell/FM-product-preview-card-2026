<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">

  <title>Frontend Mentor | Product preview card component</title>
</head>
<body>
  <article class="product">
    <picture>
      <source srcset="images/image-product-desktop.jpg" media="(min-width: 600px)">
      <img src="images/image-product-mobile.jpg" alt="X product description">
    </picture>

    <div class="product__body">
      <span class="product__tag">perfume</span>
      <h1 class="product__title">Gabrielle Essence Eau De Parfum</h1>
      <p class="product__desc">A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>
    
      <div class="flex-group">
        <span class="product__price-sale">$149.99</span>
        <span class="product__price-og">$169.99</span>
      </div>

      <button class="button" data-icon="shopping-cart">Add to Cart</button>
    </div>
  </article>
</body>
</html>
